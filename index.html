<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caleb Morris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #181818;
      --surface:      #0f0f0f;
      --border:       #3f3f3f;
      --accent:       #3ea6ff;
      --text:         #f1f1f1;
      --text-dim:     #aaaaaa;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 2rem; font-weight: 500; margin-bottom: 0.5rem; }
    p  { color: var(--text-dim); margin-bottom: 2.5rem; }
    nav { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 360px; }
    a.card {
      display: block;
      padding: 1.25rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }
    a.card:hover { border-color: var(--accent); background: #151515; }
    a.card span { display: block; color: var(--text-dim); font-size: 0.85rem; font-weight: 400; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <h1>Caleb Morris</h1>
  <p>Projects &amp; demos</p>
  <nav>
    <a class="card" href="visual-effects/">
      Visual Effects
      <span>CSS &amp; JS animation demos</span>
    </a>
  </nav>
</body>
</html>
